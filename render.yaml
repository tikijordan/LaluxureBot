# Blueprint Render — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: laluxure-bot
    runtime: docker
    plan: starter
    region: frankfurt
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SELF_PING
        value: "1"
      - key: PROACTIVE_RECONNECT_HOURS
        value: "0"
      - key: MONGODB_URI
        sync: false
      - key: INSTANCE_LOCK_TTL_MS
        value: "90000"
      - key: INSTANCE_LOCK_HEARTBEAT_MS
        value: "30000"
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: PREFIX
        value: ":"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=400"